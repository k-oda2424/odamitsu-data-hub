spring:
  main:
    allow-bean-definition-overriding: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  # Flyway: DB migration 自動適用
  # - 既存 DB (migration が手動適用済み) は baseline-version=18 で初回 baseline → V001〜V018 はスキップ
  # - 新規 DB (空) は baseline-on-migrate が無効になり V001〜 を全件適用
  # - 今後のスキーマ変更は V019__xxx.sql 以降に追加すれば自動適用される
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 18
    validate-on-migrate: true

server:
  port: 8090

# 外部API接続設定
# B-CART アクセストークンは環境変数 BCART_ACCESS_TOKEN 経由で必ず設定する。
# ソースコードや git 管理対象ファイルに直接書き込まないこと。
bcart:
  api:
    access-token: ${BCART_ACCESS_TOKEN:}
