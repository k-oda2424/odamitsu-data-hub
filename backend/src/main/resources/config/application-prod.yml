spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55544}/${DB_NAME:oda32db}
    username: ${DB_USERNAME:oda32}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: ${SERVER_PORT:8090}
  shutdown: graceful
  tomcat:
    max-threads: 200
    accept-count: 100

cors:
  allowed-origins: ${CORS_ORIGINS:https://odamitsu.example.com}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: WARN
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF
    jp.co.oda32: INFO
    org.springframework.security: WARN
  file:
    name: ${LOG_PATH:./logs}/application.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
